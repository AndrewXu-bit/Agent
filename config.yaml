# Agent Framework 配置文件
# 所有配置项集中管理，支持运行时动态加载

# LLM 模型配置
llm:
  # 默认使用的提供商 (openai, anthropic, mock)
  provider: "openai"
  
  # OpenAI 兼容模型配置
  openai:
    api_key: ""
    base_url: "https://api.deepseek.com"
    model: "deepseek-v4-flash"
#    api_key: "4b83b5db6892483292573ef078d3d486.UrYtoOJeQHxG73HC"
#    base_url: "https://open.bigmodel.cn/api/paas/v4"
#    model: "glm-4.6v-flash"
    max_tokens: 4096
    temperature: 0.7
    timeout: 120
  
  # Anthropic Claude 配置
  anthropic:
    api_key: "${ANTHROPIC_API_KEY}"
    model: "claude-sonnet-5-20251001"
    max_tokens: 4096
    version: "2023-06-01"
  
  # Mock 模式（测试用）
  mock:
    model: "mock-model"
    response: null

# Agent 核心配置
agent:
  name: "TaskAssistant"
  system_prompt: |
    你是一个智能任务助手，可以帮助用户完成各种任务。
    你可以使用多种工具来协助工作，包括本地知识库查询、时间查询、天气获取、URL内容抓取等。
    
    重要原则：
    1. 优先使用本地知识库（query_knowledge_base 工具）检索已索引的文档来回答问题。
    2. 只有当本地知识库无相关内容或返回"未找到"时，才考虑使用 fetch_url 等联网工具。
    3. 基于知识库检索结果回答时，请引用来源信息。
    
    请根据用户需求选择合适的工具，并提供准确、有用的回答。
  max_steps: 10
  verbose: true

# 工具配置
tools:
  # 启用的工具列表
  enabled:
    - query_knowledge_base
    - get_time
    - get_weather
    - fetch_url
    - calculate
  
  # 工具特定配置
  weather:
    default_city: "Beijing"
    timeout: 15
  
  url_fetcher:
    max_length: 500
    timeout: 15
    allowed_domains: []  # 空表示允许所有域名
  
  calculator:
    safe_mode: true  # 启用安全计算模式

# MCP 服务配置（可选）
mcp:
  enabled: true
  servers:
    - name: "amap-map"
      transport: "sse"
      url: "https://mcp.amap.com/sse?key=6ecc69c9cfdc6575a8af9160a1789137"

# 飞书机器人配置
feishu:
  app_id: "cli_aac26dc2f0f89ce3"
  app_secret: ""
  verification_token: ""
  encrypt_key: ""  # 可选，如果启用了消息加密
  host: "0.0.0.0"
  port: 8000

# 日志配置
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/agent.log"
  console: true

# RAG 知识库配置
rag:
  # 嵌入模型（BGE-M3）
  embedding:
    model_path: "RAG/model/BAAI/bge-m3"   # 本地模型路径，相对项目根目录
    device: null                            # null 自动检测；可指定 cuda/cpu
    max_length: 8192
    normalize_embeddings: true
    use_fp16: true

  # 重排序模型（BGE-Reranker-Large）
  reranker:
    model_path: "RAG/model/BAAI/bge-reranker-large"
    device: null
    max_length: 512
    use_fp16: true

  # 文档目录（待索引的文档存放位置）
  docs_dir: "RAG/data/documents"

  # 文档分割
  chunk_size: 512
  chunk_overlap: 50

  # 向量数据库（Chroma）
  chroma:
    collection: "rag_knowledge"
    persist_dir: "./chroma_db"

  # 检索参数
  similarity_top_k: 10
  bm25_top_k: 10
  rerank_top_k: 5
  use_reranker: true
  use_hybrid_retrieval: true
  similarity_threshold: 0.5        # 相关性阈值，低于此值的结果视为不相关（避免无关问题误返回本地内容）
